etrpc:
  service_name: alarm-manage
  service_port: ${PORT_ALARM_MANAGE}
global:
  max_frame_size: 1048576000
  namespace: Production
  local_ip: ${LOCAL_IP}
server:
  filter:
    - recovery
  server: ${etrpc.service_name}
  service:
    - ip: 0.0.0.0
      name: ${etrpc.service_name}
      network: tcp
      port: ${etrpc.service_port}
      protocol: http
    - name: trpc.kafka.consumer.service
      address: ${KAFKA_ADDR}?topics=${KAFKA_ALARM_PRODUCE_TOPIC}&group=alarm-manage&initial=newest
      protocol: kafka
client:
  service:
    - name: trpc.mysql.tbos.alarm
      target: dsn://${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_ADDR})/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local
    - name: trpc.redis.tbos.alert
      target: redis://:${REDIS_PASSWORD}@${REDIS_ADDR}/0
    - name: trpc.kafka.tbos.cgi_sync
      target: kafka://${KAFKA_ADDR}?topic=${KAFKA_ALARM_PUSH_TOPIC}&partitioner=roundrobin&maxMessageBytes=3145728&compression=lz4
    - callee: tbos.cmdb.ConfigQuery
      name: cmdb
      protocol: http
      target: ip://${LOCAL_IP}:${PORT_CMDB}

plugins:
  database:
    gorm:
      logger:
        colorful: true
        ignore_record_not_found_error: true
        log_level: 3
        max_sql_size: 256
        slow_threshold: 3000
  log:
    default:
      - caller_skip: 3
        enable_color: true
        formatter: console
        level: info
        writer: console

snowflake_config:
  set_id: 1
  update_interval: 1

AlertManageConfig:
  BatchChannelSize: 1000
  BatchFetchIntervalMS: 50
  PoolSize: 15

RestoreManageConfig:
  BatchChannelSize: 1000
  BatchFetchIntervalMS: 200
  PoolSize: 5

CollectorManageConfig:
  BatchChannelSize: 100
  BatchFetchIntervalMS: 30000
  PoolSize: 10

SyncDeviceCacheConfig:
  BatchSize: 8000
  RegularSyncDeviceInterval: 7200
  TotalLoadIntervalCnt: 12

MysqlTableName:
  ActiveAlarm: t_alarm_active
  HistoryAlarm: t_alarm_history