version: '3.8'

services:
  dac:
    build: .
    container_name: dac
    restart: unless-stopped
    ports:
      - "${PORT_DAC:-8080}:${PORT_DAC:-8080}"
    environment:
      - PORT_DAC=${PORT_DAC:-8080}
      - LOCAL_IP=0.0.0.0
      - POD_IP=0.0.0.0
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-dac123456}
      - MYSQL_ADDR=mysql:3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-dac}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dac123456}
      - REDIS_ADDR=redis:6379
      - KAFKA_ADDR=kafka:9092
      - KAFKA_POINT_TOPIC=${KAFKA_POINT_TOPIC:-dac-point}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - dac-network

  mysql:
    image: mysql:8.0
    container_name: dac-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-dac123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-dac}
      - MYSQL_CHARSET=utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  redis:
    image: redis:7-alpine
    container_name: dac-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-dac123456}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dac123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: dac-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - dac-network

volumes:
  mysql-data:
  redis-data:
  kafka-data:

networks:
  dac-network:
    driver: bridge
