etrpc:
  service_name: dac
  service_port: ${PORT_DAC}

global:
  namespace: Production
  local_ip: ${LOCAL_IP}

server:
  filter:
    - recovery
  server: ${etrpc.service_name}
  service:
    - name: ${etrpc.service_name}
      ip: 0.0.0.0
      port: ${etrpc.service_port}
      network: tcp
      protocol: http
      timeout: 60000

client:
  network: tcp
  service:
    - name: trpc.mysql.tbos
      target: dsn://${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_ADDR})/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local
    - name: trpc.redis.tbos
      target: redis://:${REDIS_PASSWORD}@${REDIS_ADDR}/0
#    - name: trpc.kafka.producer.dacPoint
#      target: kafka://${KAFKA_ADDR}?topic=${KAFKA_POINT_TOPIC}&partitioner=roundrobin&maxMessageBytes=3145728&compression=lz4
#      timeout: 30000

plugins:
  database:
    gorm:
      logger:
        colorful: true
        ignore_record_not_found_error: true
        log_level: 3
        max_sql_size: 256
        slow_threshold: 3000
  log:
    default:
      - caller_skip: 3
        enable_color: true
        formatter: console
        level: info
        writer: console

dac:
  debug: true
  enable_pooling: false

  report_to_tbos: false

  sync_from_cmdb: false
  sync_gid_from_cmdb: false
  cmdb_sync_mozus: [ ]
  sync_interval: 60

  ignore_gid_mozus: [ "test" ]
  use_get_events_mozus: [ ]

  fetch_by_time:
    hosts: [ ]
    mozus: [ ]

  expiration_time: 1
  deletion_time: 7

  ignore_fetch_mozus: [ ]
