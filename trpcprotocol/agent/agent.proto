}

message ReqRtd {
  repeated string devices = 1;
  repeated string points  = 2;
  string point_type       = 3;  // std or collect
}

message RtdPoint {
  string id        = 1;
  string pv        = 2;
  string tms       = 3;
  string des       = 4;
  string qua       = 5;
  string alm       = 6;
  bool virtual     = 7;
  string qua_delay = 8;
  string type      = 9;
}

message RspRtd {
  int32 code             = 1;
  string message         = 2;
  repeated RtdPoint data = 3;
}

message ReqQua {
  repeated int32 qua = 1;
  string point_type  = 2;  // std or collect
}

message RspQua {
  map<int32, DataPointIDs> data = 1;
}

message RspStartupProbe {
  string msg = 1;
}

message ReqExprValidate {
  string expr   = 1;
  string params = 2;
}

message RspExprValidate {
  string value = 1;
}

message DevicesCommsteRsp {
  repeated DeviceWithCommste devices = 1;
}

message DeviceWithCommste {
  string id        = 1;
  string name      = 2;
  Template tpl     = 3;
  Channel channel  = 4;
  string gid       = 5;
  int32 mozu_id    = 6;
  string type      = 7;
  RtdPoint commste = 8;
}

message SetRtdByIdReq {
  repeated RtdPoint points = 1;
}

message SetEnvReq {
  string name         = 1;
  repeated string ids = 2;
  int32 value         = 3;
}

message SetSnBindingReq {
  string sn = 1;
  string ip = 2;
}

message ProfileRsp {
  int32 code     = 1;
  string message = 2;
  Profile data   = 3;
}

message Profile {
  string gid = 1;
  string sn  = 2;
  string ip  = 3;
}

service AgentCgi {
  // @alias=/cgi/debug
  rpc Debug(ReqDebug) returns (RspDebug);
  // @alias=/cgi/devices
  rpc Devices(google.protobuf.Empty) returns (RspDevices);
  // @alias=/cgi/interval-points
  rpc IntervalPoints(google.protobuf.Empty) returns (RspIntervalPoints);
  // @alias=/cgi/rtd
  rpc Rtd(ReqRtd) returns (RspRtd);
  // @alias=/cgi/rtdById
  rpc RtdById(ReqRtd) returns (RspRtd);
  // @alias=/cgi/qua
  rpc Qua(ReqQua) returns (RspQua);
  // @alias=/cgi/prob/startup
  rpc StartupProbe(google.protobuf.Empty) returns (RspStartupProbe);
  // @alias=/cgi/exprValidate
  rpc ExprValidate(ReqExprValidate) returns (RspExprValidate);
  // @alias=/cgi/devicesCommste
  rpc DevicesCommste(google.protobuf.Empty) returns (DevicesCommsteRsp);
  // @alias=/cgi/setRtdById
  rpc SetRtdById(SetRtdByIdReq) returns (google.protobuf.Empty);
  // @alias=/cgi/env
  rpc SetEnv(SetEnvReq) returns (google.protobuf.Empty);
  // @alias=/cgi/setSnBinding
  rpc SetSnBinding(SetSnBindingReq) returns (google.protobuf.Empty);
  // @alias=/cgi/profile
  rpc Profile(google.protobuf.Empty) returns (ProfileRsp);
}

/*---------------------------------采集任务接收-----------------------------------------*/

message RecvCollectTaskReq {
  message CollectDeviceInfo {
    int64 id                    = 1;   // 主键ID
    string device_gid           = 2;   // 设备GID
    string device_number        = 3;   // 设备编码
    int32 device_type           = 4;   // 设备类型, 1:Tbox, 2: Tbox下子设备，3：厂商采集器，4：厂商采集器子设备
    string channel_type         = 5;   // 通道类型
    string channel_id           = 6;   // 通道地址
    string channel_link         = 7;   // 通道详细信息
    string profile              = 8;   // 模版详细配置
    int32 active_status         = 9;   // 激活状态
    string template_name        = 10;  // 模版名称
    string parent_device_number = 11;  // 父级设备编号
    int32 mozu_id               = 12;  // 所属模组ID
  }
  string version_mark                    = 1;
  int32 publish_type                     = 2;
  repeated CollectDeviceInfo add_devices = 3;
  repeated CollectDeviceInfo del_devices = 4;
}

service CollectTask {
  // @alias=/CollectTask/RecvTask
  rpc RecvCollectTask(RecvCollectTaskReq) returns (google.protobuf.Empty);
}

message CollectorConfig {
  int64 id                    = 1;   // 主键ID
  string device_gid           = 2;   // 设备GID
  string device_number        = 3;   // 设备编码
  int32 device_type           = 4;   // 设备类型, 1:Tbox, 2: Tbox下子设备，3：厂商采集器，4：厂商采集器子设备
  string channel_type         = 5;   // 通道类型
  string channel_id           = 6;   // 通道地址
  string channel_link         = 7;   // 通道详细信息
  string profile              = 8;   // 模版详细配置
  int32 active_status         = 9;   // 激活状态
  string template_name        = 10;  // 模版名称
  string parent_device_number = 11;  // 父级设备编号
  int32 mozu_id               = 12;  // 所属模组ID
}

message TaskReq {
  repeated CollectorConfig data = 1;
}

message TaskRsp {
  string msg = 1;
}

service TaskConfig {
  // @alias=/Config/RecvTask
  rpc RecvTask(TaskReq) returns (TaskRsp);
}

