service ConfigManager {
  /* ----------------------- device group ------------------------------*/

  // 获取设备测点列表 /tbcm/device/points
  rpc GetCollectDevicePoints(GetCollectDevicePointsReq) returns (GetCollectDevicePointsRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/device/points"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/device/ctl
  rpc Control(ControlReq) returns (StringDataRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/device/ctl"
      body: "*"
    };
  }
  // /tbcm/device/tiotControl
  rpc TIotControl(TIotControlReq) returns (Response) {
    option (trpc.api.http) = {
      post: "/tbcm/device/tiotControl"
      body: "*"
    };
  }
  // /tbcm/device
  rpc ProcessDevice(ProcessDeviceReq) returns (StringDataRsp) {
    option (trpc.api.http) = {
      put: "/tbcm/device"
      body: "req_put"
      response_body: "*"
      additional_bindings {
        delete: "/tbcm/device"
        body: "req_del"
        response_body: "*"
      }
    };
  }

  /* ----------------------- devices group ------------------------------*/

  // /tbcm/devices/version
  rpc GetCollectDeviceVersion(google.protobuf.Empty) returns (GetCollectDeviceVersionRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/devices/version"
    };
  }
  // /tbcm/devices/batch
  rpc BatchCreateDevices(BatchDevicesReq) returns (BatchDevicesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/batch"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/devices/batch-update
  rpc BatchUpdateDevices(BatchDevicesReq) returns (BatchDevicesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/batch-update"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/devices
  rpc ProcessAllDevices(ProcessAllDevicesReq) returns (ProcessAllDevicesRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/devices"
      response_body: "rsp_get"
      additional_bindings {
        delete: "/tbcm/devices"
        body: "req_del"
        response_body: "rsp_del"
      }
    };
  }
  // /tbcm/device/fetch
  rpc GetCollectDevice(IDRequest) returns (GetDeviceRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/device/fetch"
      body: "*"
      response_body: "*"
    };
  }
  // tbcm/devices/get
  rpc BatchGetCollectDevices(BatchGetReq) returns (GetCollectDevicesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/get"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/devices/tpl
  rpc PostDevicesTemplates(google.protobuf.Empty) returns (PostDevicesTemplatesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/tpl"
      response_body: "*"
    };
  }

  // /tbcm/devices/download
  rpc DownloadDevices(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/devices/download"
    };
  }

  // /tbcm/tpls/device
  rpc ExportDeviceTemplate(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/tpls/device"
    };
  }

  /* ----------------------- tpls group ------------------------------*/

  // /tbcm/tpls
  rpc ProcessTemplates(google.protobuf.Empty) returns (ProcessTemplatesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/tpls"
      response_body: "rsp_post"
      additional_bindings {
        get: "/tbcm/tpls"
        response_body: "rsp_get"
      }
    };
  }
  // /tbcm/tpls/excel
  rpc ExportAllTemplates(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/tpls/excel"
    };
  }

  // /tbcm/tpls/excel/class/vendor/name
  rpc ExportTemplate(ExportTemplateRequest) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/tpl/excel/{path=*/*/*}"
    };
  }

  // /tbcm/tpls/json/class/vendor/name
  rpc GetTemplate(GetTemplateRequest) returns (RspGetTemplate) {
    option (trpc.api.http) = {
      get: "/tbcm/tpl/json/{path=*/*/*}"
    };
  }

  // /tbcm/tpls/json/cloud/class/vendor/name
  rpc GetTemplateFromCloud(GetTemplateRequest) returns (RspGetTemplate) {
    option (trpc.api.http) = {
      get: "/tbcm/tpl/json/cloud/{path=*/*/*}"
    };
  }
  /* ----------------------- tpl group ------------------------------*/

  // /tbcm/tpl
  rpc ProcessTemplate(ProcessTemplateReq) returns (ProcessTemplateRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/tpl"
      body: "req_post"
      response_body: "rsp_post"
      additional_bindings {
        delete: "/tbcm/tpl"
        body: "req_del"
        response_body: "rsp_del"
      }
    };
  }

  /* ----------------------- log group ------------------------------*/
  // /tbcm/log/run
  rpc ProcessRunLog(ProcessRunLogReq) returns (ProcessRunLogRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/log/run"
      body: "*"
      response_body: "*"
      additional_bindings {
        get: "/tbcm/log/run"
      }
    };
  }

  // /tbcm/log/packet
  rpc ProcessLogPacket(ProcessLogPacketReq) returns (ProcessLogPacketRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/log/packet"
      body: "*"
      response_body: "*"
    };
  }

  /* ----------------------- std group ------------------------------*/
  // /tbcm/std/device 标准设备列表查询
  rpc GetStdDevice(google.protobuf.Empty) returns (GetStdDeviceRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/std/device"
      body: "*"
      response_body: "*"
    };
  }

  // /tbcm/std/tree 标准设备树查询
  rpc GetStdDeviceTree(google.protobuf.Empty) returns (GetStdDeviceTreeRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/std/tree"
      response_body: "*"
    };
  }

  // /tbcm/std/points 测点列表
  rpc GetStdPoints(GetStdPointsReq) returns (GetStdPointsRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/std/points"
      body: "*"
      response_body: "*"
    };
  }

  // /tbcm/std/src 数据源查询、修改
  rpc ProcessStdSrc(ProcessStdSrcReq) returns (ProcessStdSrcRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/std/src"
      body: "req_post"
      response_body: "rsp_post"
      additional_bindings {
        put: "/tbcm/std/src"
        body: "req_put"
        response_body: "rsp_put"
      }
    };
  }

  // /tbcm/standard/points 标准设备及测点查询
  rpc GetStdDevicesAndPoints(google.protobuf.Empty) returns (GetStdDevicesAndPointsRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/standard/points"
      response_body: "*"
    };
  }

  /* ----------------------- std group ------------------------------*/

  // /tbcm/network
  rpc ProcessNetwork(NetworkStatus) returns (ProcessNetworkRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/network"
      body: "*"
      additional_bindings {
        get: "/tbcm/network"
        response_body: "*"
      }
    };
  }

  // /tbcm/network/switch/enable
  rpc EnableSwitch(EnableSwitchReq) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      post: "/tbcm/network/switch/enable"
      body: "*"
    };
  }

  // /tbcm/network/switch/disable
  rpc DisableSwitch(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      post: "/tbcm/network/switch/disable"
    };
  }

  /* ----------------------- other group ------------------------------*/

  // /tbcm/login
  rpc Login(LoginReq) returns (LoginRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/login"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/groups
  rpc CmGroups(CmGroupsReq) returns (CmGroupsRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/groups"
    };
  }
  // /tbcm/serials
  rpc GetSerials(google.protobuf.Empty) returns (GetSerialsRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/serials"
      response_body: "*"
    };
  }
  // /tbcm/serial
  rpc SetSerial(SetSerialReq) returns (SetSerialRsp) {
    option (trpc.api.http) = {
      put: "/tbcm/serial"
      body: "*"
      response_body: "*"
    };
  }
}

message RspGetTemplate {
  int32 code        = 1;
  string message    = 2;
  TemplateData data = 3;
}

message TemplateData {
  DrvInfo drvinfo                       = 1;
  repeated Point points                 = 2;
  google.protobuf.NullValue sub_devices = 3;
}

message DrvInfo {
  string cls     = 1;
  string vendor  = 2;
  string drvlib  = 3;
  string protver = 4;
  string extend  = 5;
}

message Point {
  string access         = 1;
  string cls            = 2;
  string id             = 3;
  string name           = 4;
  ExpDef expdef         = 5;
  ProtDef protdef       = 6;
  ValDef valdef         = 7;
  string valtype        = 8;
  Simulator simulator   = 9;
  string sub_device     = 10;
  string is_north       = 11;
  string value_range    = 12;
  string value_deadzone = 13;
}

message ExpDef {
  string expression  = 1;
  string var_mapping = 2;
}

message ProtDef {
  string byteorder    = 1;
  string cmd          = 2;
  string datatype     = 3;
  string ext          = 4;
  string val_key      = 5;
  string offset       = 6;
  string scale        = 7;
  string cmd_interval = 8;
}

message ValDef {
  string val0 = 1;
  string val1 = 2;
}

message Simulator {
  string name  = 1;
  string value = 2;
}

message GetStdDeviceRsp {
  int32 code           = 1;
  string message       = 2;
  repeated Device data = 3;  // 树根节点列表
  // 树节点
  message Device {
    string device_gid          = 1;  // 设备GID
    string device_number       = 2;  // 设备编码
    string device_no           = 3;  // 设备编号,同层同类型设备序号
    string device_type_en      = 4;  // 设备种类英文
    string device_type_zh      = 5;  // 设备种类中文
    string application_type_en = 6;  // 应用类型英文
    string application_type_zh = 7;  // 应用类型中文
  }
}

message GetStdDeviceTreeRsp {
  int32 code             = 1;
  string message         = 2;
  repeated TreeNode data = 3;
  // 树节点
  message TreeNode {
    string device_gid          = 1;   // 设备GID
    string device_number       = 2;   // 设备编码
    string device_number_show  = 3;   // 展示编码
    string device_no           = 4;   // 设备编号,同层同类型设备序号
    string device_type_en      = 5;   // 设备种类英文
    string device_type_zh      = 6;   // 设备种类中文
    string application_type_en = 7;   // 应用类型英文
    string application_type_zh = 8;   // 应用类型中文
    repeated TreeNode children = 9;   // 子设备列表
    int32 device_count         = 10;  // 子设备数量
  }
}

message GetStdDevicesAndPointsRsp {
  message Point {
    string id        = 1;  // 测点id
    string name      = 2;  // 测点名称
    string unit      = 3;  // 测点单位
    string class     = 4;
    string data_type = 5;
  }
  message Device {
    string id               = 1;  // 设备id
    string type             = 2;  // 设备类型
    string name             = 3;  // 设备名称
    repeated Point points   = 4;  // 设备测点
    repeated Device devices = 5;  // 子设备
  }
  int32 code           = 1;
  string message       = 2;
  repeated Device data = 3;
}

message GetStdPointsReq {
  repeated string device_gid = 1;  // 设备GID
  int32 page                 = 2;  // 页数
  int32 size                 = 3;  // 页大小
}

// 获取测点信息-响应参数
message GetStdPointsRsp {
  int32 code                      = 1;
  string message                  = 2;
  repeated DevicePointObject data = 3;  // 设备测点列表
}
// 设备测点对象
message DevicePointObject {
  string device_gid        = 1;   // 设备GID
  string device_number     = 2;   // 设备编码
  string point_name_en     = 3;   // 测点名称英文(测点标识)
  string point_name_zh     = 4;   // 测点名称中文(测点名称)
  string point_key         = 5;   // 测点标识(GID.测点英文)
  string point_rw          = 6;   // 测点读写分类(只读、读写)
  string point_level       = 7;   // 测点级别
  int32 point_standard     = 8;   // 是否标准测点
  string expression        = 9;   // 测点表达式
  string expression_map    = 10;  // 测点映射(设备GID)
  string expression_map_zh = 11;  // 测点映射(设备编号)
  string value_type        = 12;  // 测点值类型(数据类型：模拟量、状态量)
  int32 enable             = 13;  // 是否启用(0:禁用, 1:启用)
  string value_valid_range = 14;  // 测点值有效范围
  string value_unit        = 15;  // 测点值单位
  string value_precision   = 16;  // 测点值精度
  string value_enum        = 17;  // 值枚举映射
  string update_time       = 18;  // 更新时间
  string point_value       = 19;  // 测点实时值
  string point_type        = 20;  // 测点类型（直采、计算）
}

message ProcessStdSrcRsp {
  StdSrcPostRsp rsp_post = 1;
  StdSrcPutRsp rsp_put   = 2;
}

message ProcessStdSrcReq {
  message ReqPost {
    string point_key = 1;  // 测点key(gid.测点英文)
  }
  message ReqPut {
    string point_key                      = 1;  // 测点key(gid.测点英文)
    string expression                     = 2;  // 测点表达式
    map<string, RefObject> expression_map = 3;  // 测点映射(A=xxx,B=xxx)
  }
  ReqPost req_post = 1;
  ReqPut req_put   = 2;
}

message StdSrcPutRsp {
  int32 code     = 1;
  string message = 2;
  string data    = 3;
}

message GetStdSrcReq {
  string point_key = 1;  // 测点key(gid.测点英文)
}

message StdSrcPostRsp {
  int32 code      = 1;
  string message  = 2;
  StdSrcData data = 3;
}

message StdSrcData {
  string point_key                      = 1;  // 测点key(gid.测点英文)
  string expression                     = 2;  // 测点表达式
  map<string, RefObject> expression_map = 3;  // 测点映射(A=xxx,B=xxx)
}

message RefObject {
  string type          = 1;  // 对象类型（采集）
  string id            = 2;  // 对象编码（"0::ACM_1"）
  string gid           = 3;  // 对象GID("1297036692686917633")
  string point_name_en = 4;  // 测点信号
  string point_name_zh = 5;  // 测点中文
}

/*---------------------------------t-box管理-----------------------------------------*/

message SetNtpReq {
  int32 enable   = 1;
  int32 interval = 2;
  string server  = 3;
  string port    = 4;
}

message SetRealTimeReq {
  uint64 time = 1;
}

service BoxManager {
  // @alias=/tbox/time/ntp
  rpc SetNtp(SetNtpReq) returns (google.protobuf.Empty);
  // @alias=/tbox/time
  rpc SetRealTime(SetRealTimeReq) returns (google.protobuf.Empty);
  // @alias=/tbox/restart
  rpc OSRestart(google.protobuf.Empty) returns (google.protobuf.Empty);
  // @alias=/tbox/agent/restart
  rpc AgentRestart(google.protobuf.Empty) returns (google.protobuf.Empty);
}

/*---------------------------------实时数据配置-----------------------------------------*/

message SetMessagePushParamsReq {
  string type      = 1;
  string target    = 2;
  string client_id = 3;
  string name      = 4;
}

message GetMessagePushParamsRsp {
  message MessagePushParams {
    string type      = 1;
    string target    = 2;
    string client_id = 3;
    string name      = 4;
  }
  repeated MessagePushParams params = 1;
}

message OnlineStrategyPushReq {
  int64 strategy_id        = 1;  // 策略 id
  int64 period             = 2;  // 同周期的多个包该值一致
  repeated PushDevice objs = 3;  // 设备数组
}

message PushDevice {
  string guid               = 1;  // 设备对象 guid
  int32 status              = 2;  // 设备的状态，1 表示通信中断，0 表示通信正常
  repeated PushPoint points = 3;  // 点位数组
}

message PushPoint {
  string tag      = 1;  // 点位对象 tag
  string value    = 2;  // 点位的实时值，必须是数值型，最大长度64字节
  int64 qua       = 3;  // qua数据质量
  int64 timestamp = 4;  // 点位的采集时间，UNIX 时间戳
}

message OnlineStrategyPushRsp {
  bool status = 1;
}

service RealTimeDataManager {
  // /north
  rpc SetMessagePushParams(SetMessagePushParamsReq) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      post: "/north"
      body: "*"
      response_body: "*"
    };
  }

  // @alias=/north/get
  rpc GetMessagePushParams(google.protobuf.Empty) returns (GetMessagePushParamsRsp);

  // @alias=/north/online_strategy_push
  rpc OnlineStrategyPush(OnlineStrategyPushReq) returns (OnlineStrategyPushRsp);
}

/*---------------------------------TBus配置-----------------------------------------*/

enum MessageType {
  TypeInvalid                     = 0;
  TypePoint                       = 1;
  TypeRegisterRequest             = 2;
  TypeRegisterResponse            = 3;
  TypeControlRequest              = 4;
  TypeControlResponse             = 5;
  TypeHeartbeat                   = 6;
  TypeCollectorPointInfoRequest   = 7;
  TypeCollectorPointInfoResponse  = 8;
  TypeDevicePointInfoRequest      = 9;
  TypeDevicePointInfoResponse     = 10;
  TypePointRtDataRequest          = 11;
  TypePointRtDataResponse         = 12;
  TypePingRequest                 = 13;
  TypeAssignRequest               = 14;
  TypeAssignResponse              = 15;
  TypeCollectorDeviceInfoRequest  = 16;
  TypeCollectorDeviceInfoResponse = 17;
  TypeCollectorDetailInfoRequest  = 18;
  TypeCollectorDetailInfoResponse = 19;
  TypeDeviceDetailInfoRequest     = 20;
  TypeDeviceDetailInfoResponse    = 21;
  TypeForwardHTTPRequest          = 22;
  TypeNewDevicesRequest           = 23;
  TypeBackupRequest               = 24;
  TypeRestoreRequest              = 25;
  TypeResetRequest                = 26;
  TypeControlPointRequest         = 27;
  TypeTimeSyncNotification        = 28;
  TypeTimeSyncRequest             = 29;
  TypeTimeSyncResponse            = 30;
  TypeFetchVersionRequest         = 31;
  TypeFetchDevicesRequest         = 32;
  TypeFetchTemplatesRequest       = 33;
  TypeFetchSNMPRequest            = 34;
}

message Request {
  MessageType type = 1;
  bytes key        = 2;
  bytes value      = 3;
}

message InnerData {
  string data = 1;
}

message Response {
  int32 code     = 1;
  string message = 2;
  InnerData data = 3;
}
