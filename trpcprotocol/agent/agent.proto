syntax = "proto3";
// package code generated by ifbook，edit if necessary.
package tbos.agent;
// 建议使用谷歌protobuf规范 遵循PB语法检查
// 谷歌protobuf规范地址：https://developers.google.com/protocol-buffers/docs/style
// Proto格式检查（Tencent）包含：Google protobuf规范和数据校验检查

option go_package = "trpcprotocol/agent";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
// 该文件定义了 trpc.api.http 注解，用于指定 RESTful 服务的 HTTP 规则
import "trpc/api/annotations.proto";

message ReqDebug {
  int32 enable_time = 1;
}

message RspDebug {
  string msg = 1;
}

message RunningStatus {
  repeated string devices = 1;
  bool is_running = 2;
}

message RspDevices {
  map<string, RunningStatus> status= 1;
}

message DataPointIDs {
  repeated string data_point_id = 1;
}

message RspIntervalPoints {
  map<int32, DataPointIDs> data = 1;
}

message ReqRtd {
  repeated string devices = 1;
  repeated string points = 2;
  string point_type = 3;  // std or collect
}

message RtdPoint {
  string id = 1;
  string pv = 2;
  string tms = 3;
  string des = 4;
  string qua = 5;
  string alm = 6;
  bool virtual = 7;
  string qua_delay = 8;
  string type = 9;
}

message RspRtd {
  int32 code = 1;
  string message = 2;
  repeated RtdPoint data = 3;
}

message ReqQua {
  repeated int32 qua = 1;
  string point_type = 2;  // std or collect
}

message RspQua {
  map<int32, DataPointIDs> data = 1;
}

message DeviceInfo {
  string device_number = 1;  // 设备编码
  string device_gid    = 2;  // 设备GID
}

message RspStartupProbe {
  string msg                     = 1;
  int32 total                    = 2;  // 设备总数
  int32 disconnect_pct           = 3;  // 通讯中断率
  repeated DeviceInfo all        = 4;  // 所有采集设备
  repeated DeviceInfo disconnect = 5;  // 通讯中断设备
}

message ReqExprValidate {
  string expr = 1;
  string params = 2;
}

message RspExprValidate {
  string value = 1;
}

service AgentCgi {
  // @alias=/cgi/debug
  rpc Debug(ReqDebug) returns (RspDebug);
  // @alias=/cgi/devices
  rpc Devices(google.protobuf.Empty) returns (RspDevices);
  // @alias=/cgi/interval-points
  rpc IntervalPoints(google.protobuf.Empty) returns (RspIntervalPoints);
  // @alias=/cgi/rtd
  rpc Rtd(ReqRtd) returns (RspRtd);
  // @alias=/cgi/rtdById
  rpc RtdById(ReqRtd) returns (RspRtd);
  // @alias=/cgi/qua
  rpc Qua(ReqQua) returns (RspQua);
  // @alias=/cgi/prob/startup
  rpc StartupProbe(google.protobuf.Empty) returns (RspStartupProbe);
  // @alias=/cgi/exprValidate
  rpc ExprValidate(ReqExprValidate) returns (RspExprValidate);
}

/*---------------------------------任务接收-----------------------------------------*/
message CollectorConfig {
  int64 id = 1;  // 主键ID
  string device_gid = 2;  // 设备GID
  string device_number = 3;  // 设备编码
  int32 device_type = 4;  // 设备类型, 1:Tbox, 2: Tbox下子设备，3：厂商采集器，4：厂商采集器子设备
  string channel_type = 5;  // 通道类型
  string channel_id = 6;  // 通道地址
  string channel_link = 7;  // 通道详细信息
  string profile = 8;  // 模版详细配置
  int32 active_status = 9;  // 激活状态
  string template_name = 10;  // 模版名称
  string parent_device_number = 11;  // 父级设备编号
  int32 mozu_id = 12;  // 所属模组ID
}

message TaskReq {
  repeated CollectorConfig data = 1;
}

message TaskRsp {
  string msg = 1;
}

service TaskConfig {
  // @alias=/Config/RecvTask
  rpc RecvTask(TaskReq) returns (TaskRsp);
}

/*---------------------------------设备属性配置-----------------------------------------*/

message Template {
  string tplnm = 1;
  string tplpath = 2;
}

message Channel {
  string chtype = 1;  // type
  string chid = 2;  // id
  string chparams = 3;  // params
  string addr = 4;
  string wait_time = 5;  // device wait time
  string cmd_intetrval = 6;  // command interval
  string timeout = 7;  // request timeout
  string max_fail_count = 8;
  string max_fail_time = 9;
}

message CollectDevice {
  string id = 1;
  string name = 2;
  Template tpl = 3;
  Channel channel = 4;
  string gid = 5;
  int32 mozu_id = 6;
  string type = 7;
}

message ProcessAllDevicesReq {
  message ReqPost {
    string name = 1;
  }
  message ReqDel {
    repeated string ids = 1;
  }
  ReqPost req_post = 1;
  ReqDel req_del = 2;
}

message ProcessAllDevicesRsp {
  message RspGet {
    int32 code = 1;
    string message = 2;
    repeated CollectDevice data = 3;
  }
  message RspDel {
    int32 code = 1;
    string message = 2;
    repeated string data = 3;
  }
  RspGet rsp_get = 1;
  RspDel rsp_del = 2;
}

message GetCollectDevicesRsp {
  int32 code = 1;
  string message = 2;
  repeated CollectDevice data = 3;
}

message GetCollectDevicePointsReq {
  string id = 1;
}

message GetCollectDevicePointsRsp {
  int32 code = 1;
  string message = 2;
  repeated CollectPoint data = 3;
  message CollectPoint {
    string no                        = 1;  // 测点标识
    string id                        = 2;  // 测点名称英文 point_name_en
    string name                      = 3;  // 测点名称英文 point_name_en
    string access                    = 4;  // 测点读写分类 point_rw
    google.protobuf.Struct valdef    = 5;  // 格式取决于测点类型
    string valtype                   = 6;  // 测点类型 point_type
  }
}

message GetCollectDeviceVersionRsp {
  int32 code = 1;
  string message = 2;
  VersionData data = 3;

  message VersionData {
    string version = 1;
  }
}

message ControlReq {
  string point_id = 1;
  string value = 2;
}

message BatchDevicesReq {
  repeated CollectDevice devices = 1;
}

message BatchDevicesRsp {
  int32 code = 1;
  string message = 2;
  repeated string data = 3;
}

message IDRequest {
  string id = 1;
}

message ProcessDeviceReq {
  message ReqPut {
    string id = 1;
    CollectDevice data = 2;
  }
  ReqPut req_put = 1;
  IDRequest req_del = 2;
}

message StringDataRsp {
  int32 code = 1;
  string message = 2;
  string data = 3;
}

message GetDeviceRsp {
  int32 code = 1;
  string message = 2;
  CollectDevice data = 3;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginRsp {
  int32 code = 1;
  string message = 2;
  LoginData data = 3;

  message LoginData {
    string token = 1;
  }
}

message BatchGetReq {
  repeated string ids = 1;
}

message CmGroupsReq {
  string group = 1;
}

message CmGroupsRsp {
  int32 code = 1;
  string message = 2;
  repeated CmGroupsList data = 3;

  message CmGroupsList {
    string id = 1;
    string name = 2;
    string pid = 3;
  }
}

message ProcessTemplatesRsp {
  message RspGet {
    message TemplateNode {
      string name = 1;
      string path = 2;
      int32 is_dir = 3;
      repeated TemplateNode children = 4;
    }
    int32 code = 1;
    string message = 2;
    repeated TemplateNode data = 3;
  }
  StringDataRsp rsp_post = 1;
  RspGet rsp_get = 2;
}

message SerialInfo {
  string baud = 1;
  string databit = 2;
  string dev = 3;
  string id = 4;
  string mode = 5;
  string parity = 6;
  string stopbit = 7;
}

message GetSerialsRsp {
  int32 code = 1;
  string message = 2;
  map<string, SerialInfo> data = 3;
}

message ProcessTemplateReq {
  message ReqPost {
    string device_id = 1;
  }
  message ReqDel {
    string path = 1;
  }
  ReqPost req_post = 1;
  ReqDel req_del = 2;
}

message ProcessTemplateRsp {
  StringDataRsp rsp_del = 1;
  Template rsp_post = 2;
}

message SetSerialReq {
  string id = 1;
  SerialInfo data = 2;
}

message SetSerialRsp {
  int32 code = 1;
  string message = 2;
  string data = 3;
}

message ProcessRunLogReq {
  int32 num = 1;
}

message ProcessRunLogRsp {
  int32 code = 1;
  string message = 2;
  string data = 3;
}

message PostDevicesTemplatesRsp {
  message FileContent {
    repeated CollectDevice devices = 1;
  }
  int32 code = 1;
  string message = 2;
  repeated FileContent data = 3;
}

message ExportTemplateRequest {
  string path = 1;
}

service ConfigManager {
  /* ----------------------- device group ------------------------------*/

  // 获取设备测点列表 /tbcm/device/points
  rpc GetCollectDevicePoints(GetCollectDevicePointsReq) returns (GetCollectDevicePointsRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/device/points"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/device/ctl
  rpc Control(ControlReq) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      post: "/tbcm/device/ctl"
      body: "*"
    };
  }
  // /tbcm/device
  rpc ProcessDevice(ProcessDeviceReq) returns (StringDataRsp) {
    option (trpc.api.http) = {
      put: "/tbcm/device"
      body: "req_put"
      response_body: "*"
      additional_bindings {
        delete: "/tbcm/device"
        body: "req_del"
        response_body: "*"
      }
    };
  }

  /* ----------------------- devices group ------------------------------*/

  // /tbcm/devices/version
  rpc GetCollectDeviceVersion(google.protobuf.Empty) returns (GetCollectDeviceVersionRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/devices/version"
    };
  }
  // /tbcm/devices/batch
  rpc BatchCreateDevices(BatchDevicesReq) returns (BatchDevicesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/batch"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/devices/batch-update
  rpc BatchUpdateDevices(BatchDevicesReq) returns (BatchDevicesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/batch-update"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/devices
  rpc ProcessAllDevices(ProcessAllDevicesReq) returns (ProcessAllDevicesRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/devices"
      response_body: "rsp_get"
      additional_bindings {
        delete: "/tbcm/devices"
        body: "req_del"
        response_body: "rsp_del"
      }
    };
  }
  // /tbcm/device/fetch
  rpc GetCollectDevice(IDRequest) returns (GetDeviceRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/device/fetch"
      body: "*"
      response_body: "*"
    };
  }
  // tbcm/devices/get
  rpc BatchGetCollectDevices(BatchGetReq) returns(GetCollectDevicesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/get"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/devices/tpl
  rpc PostDevicesTemplates(google.protobuf.Empty) returns (PostDevicesTemplatesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/devices/tpl"
      response_body: "*"
    };
  }

  // /tbcm/devices/download
  rpc DownloadDevices(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/devices/download"
    };
  }

  // /tbcm/tpls/device
  rpc ExportDeviceTemplate(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/tpls/device"
    };
  }

  /* ----------------------- tpls group ------------------------------*/

  // /tbcm/tpls
  rpc ProcessTemplates(google.protobuf.Empty) returns (ProcessTemplatesRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/tpls"
      response_body: "rsp_post"
      additional_bindings {
        get: "/tbcm/tpls"
        response_body: "rsp_get"
      }
    };
  }
  // /tbcm/tpls/excel
  rpc ExportAllTemplates(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/tpls/excel"
    };
  }

  // /tbcm/tpls/excel/class/vendor/name
  rpc ExportTemplate(ExportTemplateRequest) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      get: "/tbcm/tpl/excel/{path=*/*/*}"
    };
  }

  /* ----------------------- tpl group ------------------------------*/

  // /tbcm/tpl
  rpc ProcessTemplate(ProcessTemplateReq) returns (ProcessTemplateRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/tpl"
      body: "req_post"
      response_body: "rsp_post"
      additional_bindings {
        delete: "/tbcm/tpl"
        body: "req_del"
        response_body: "rsp_del"
      }
    };
  }

  /* ----------------------- log group ------------------------------*/
  // /tbcm/log/run
  rpc ProcessRunLog(ProcessRunLogReq) returns (ProcessRunLogRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/log/run"
      body: "*"
      response_body: "*"
      additional_bindings {
        get: "/tbcm/log/run"
      }
    };
  }
  /* ----------------------- std group ------------------------------*/
  // /tbcm/std/device 标准设备列表查询
  rpc GetStdDevice(google.protobuf.Empty) returns (GetStdDeviceRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/std/device"
      body: "*"
      response_body: "*"
    };
  }

  // /tbcm/std/tree 标准设备树查询
  rpc GetStdDeviceTree(google.protobuf.Empty) returns (GetStdDeviceTreeRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/std/tree"
      response_body: "*"
    };
  }

  // /tbcm/std/points 测点列表
  rpc GetStdPoints(GetStdPointsReq) returns (GetStdPointsRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/std/points"
      body: "*"
      response_body: "*"
    };
  }

  // /tbcm/devices/version 数据源查询
  rpc GetStdSrc(GetStdSrcReq) returns (GetStdSrcRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/std/src/get"
      body: "*"
      response_body: "*"
    };
  }

  // /tbcm/standard/points 标准设备及测点查询
  rpc GetStdDevicesAndPoints(google.protobuf.Empty) returns (GetStdDevicesAndPointsRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/standard/points"
      response_body: "*"
    };
  }

  /* ----------------------- other group ------------------------------*/

  // /tbcm/login
  rpc Login(LoginReq) returns (LoginRsp) {
    option (trpc.api.http) = {
      post: "/tbcm/login"
      body: "*"
      response_body: "*"
    };
  }
  // /tbcm/groups
  rpc CmGroups(CmGroupsReq) returns (CmGroupsRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/groups"
    };
  }
  // /tbcm/serials
  rpc GetSerials(google.protobuf.Empty) returns (GetSerialsRsp) {
    option (trpc.api.http) = {
      get: "/tbcm/serials"
      response_body: "*"
    };
  }
  // /tbcm/serial
  rpc SetSerial(SetSerialReq) returns (SetSerialRsp) {
    option (trpc.api.http) = {
      put: "/tbcm/serial"
      body: "*"
      response_body: "*"
    };
  }
}

message GetStdDeviceRsp {
  int32 code = 1;
  string message = 2;
  repeated Device data = 3;  // 树根节点列表
  // 树节点
  message Device {
    string device_gid                 = 1;  // 设备GID
    string device_number              = 2;  // 设备编码
    string device_no                  = 3;  // 设备编号,同层同类型设备序号
    string device_type_en             = 4;  // 设备种类英文
    string device_type_zh             = 5;  // 设备种类中文
    string application_type_en        = 6;  // 应用类型英文
    string application_type_zh        = 7;  // 应用类型中文
  }
}

message GetStdDevicesAndPointsRsp {
  message Device {
    string id = 1;  //设备id
    string type = 2;  // 设备类型
    string name = 3;  //


    string device_gid                 = 1;  // 设备GID
    string device_number              = 2;  // 设备编码
    string device_no                  = 3;  // 设备编号,同层同类型设备序号
    string device_type_en             = 4;  // 设备种类英文
    string device_type_zh             = 5;  // 设备种类中文
    string application_type_en        = 6;  // 应用类型英文
    string application_type_zh        = 7;  // 应用类型中文
  }
  int32 code = 1;
  string message = 2;
  repeated Device data = 3;
}

message GetStdDeviceTreeRsp {
  int32 code = 1;
  string message = 2;
  repeated TreeNode data = 3;
  // 树节点
  message TreeNode {
    string device_gid                 = 1;  // 设备GID
    string device_number              = 2;  // 设备编码
    string device_number_show         = 3;  // 展示编码
    string device_no                  = 4;  // 设备编号,同层同类型设备序号
    string device_type_en             = 5;  // 设备种类英文
    string device_type_zh             = 6;  // 设备种类中文
    string application_type_en        = 7;  // 应用类型英文
    string application_type_zh        = 8;  // 应用类型中文
    repeated TreeNode children        = 9;  // 子设备列表
    int32 device_count                = 10;  // 子设备数量
  }
}

message GetStdPointsReq {
  repeated string device_gid          = 1;  // 设备GID
  int32 page                          = 2;  // 页数
  int32 size                          = 3;  // 页大小
}

// 获取测点信息-响应参数
message GetStdPointsRsp {
  repeated DevicePointObject list = 1;  // 设备测点列表
  int32 total                     = 2;  // 总共记录数
}
// 设备测点对象
message DevicePointObject {
  string device_gid        = 1;  // 设备GID
  string device_number     = 2;  // 设备编码
  string point_name_en     = 3;  // 测点名称英文(测点标识)
  string point_name_zh     = 4;  // 测点名称中文(测点名称)
  string point_key         = 5;  // 测点标识(GID.测点英文)
  string point_rw          = 6;  // 测点读写分类(只读、读写)
  string point_level       = 7;  // 测点级别
  int32 point_standard     = 8;  // 是否标准测点
  string expression        = 9;  // 测点表达式
  string expression_map    = 10;  // 测点映射(设备GID)
  string expression_map_zh = 11;  // 测点映射(设备编号)
  string value_type        = 12;  // 测点值类型(数据类型：模拟量、状态量)
  int32 enable             = 13;  // 是否启用(0:禁用, 1:启用)
  string value_valid_range = 14;  // 测点值有效范围
  string value_unit        = 15;  // 测点值单位
  string value_precision   = 16;  // 测点值精度
  string value_enum        = 17;  // 值枚举映射
  string update_time       = 18;  //  更新时间
  string point_value       = 19;  //  测点实时值
}

message GetStdSrcReq {
  string point_key          = 1;  // 测点key(gid.测点英文)
}

message GetStdSrcRsp {
  string point_key          = 1;  // 测点key(gid.测点英文)
  string expression         = 2;  // 测点表达式
  map<string, RefObject> expression_map    = 3;  // 测点映射(A=xxx,B=xxx)
}

message RefObject {
  string object_type     = 1;  // 对象类型（采集）
  string object_number   = 2;  // 对象编码
  string object_gid      = 3;  // 对象GID
  string point_name_en  = 4;  // 测点信号
  string point_name_zh  = 5;  // 测点中文
}

/*---------------------------------t-box管理-----------------------------------------*/

message SetNtpReq {
  int32 enable = 1;
  int32 interval = 2;
  string server = 3;
  string port = 4;
}

message SetRealTimeReq {
  uint64 time = 1;
}

service BoxManager {
  // @alias=/tbox/time/ntp
  rpc SetNtp(SetNtpReq) returns (google.protobuf.Empty);
  // @alias=/tbox/time
  rpc SetRealTime(SetRealTimeReq) returns (google.protobuf.Empty);
  // @alias=/tbox/restart
  rpc OSRestart(google.protobuf.Empty) returns (google.protobuf.Empty);
  // @alias=/tbox/agent/restart
  rpc AgentRestart(google.protobuf.Empty) returns (google.protobuf.Empty);
}

/*---------------------------------实时数据配置-----------------------------------------*/

message SetMessagePushParamsReq {
  string type = 1;
  string target = 2;
  string client_id = 3;
  string name = 4;
}

message GetMessagePushParamsRsp {
  message MessagePushParams {
    string type = 1;
    string target = 2;
    string client_id = 3;
    string name = 4;
  }
  repeated MessagePushParams params = 1;
}

service RealTimeDataManager {
  // /north
  rpc SetMessagePushParams(SetMessagePushParamsReq) returns (google.protobuf.Empty) {
    option (trpc.api.http) = {
      post: "/north"
      body: "*"
      response_body: "*"
    };
  }

  // @alias=/north/get
  rpc GetMessagePushParams(google.protobuf.Empty) returns (GetMessagePushParamsRsp);
}