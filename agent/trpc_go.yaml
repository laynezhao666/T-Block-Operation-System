auth:
  hmac:
    allowed_algs:
      - sha256
    default_alg: sha256
  refer2bus:
    https://partner.example.com: partner_system
  required_routes:
    - /tbcm/device/ctl
  security:
    debug: false
    enabled: true
  sys_id_key:
client:
  filter: null
  service:
    - callee: tbos.DataBus
      name: idc-tbos-collector-trpc
      namespace: Production
      network: tcp
      protocol: trpc
      timeout: 30000
    - callee: tbos.ConfigBus
      name: idc-tbos-collector-trpc
      namespace: Production
      network: tcp
      protocol: trpc
      timeout: 30000
collector:
