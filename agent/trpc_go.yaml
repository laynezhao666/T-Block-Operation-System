  snmp:
    log_interval: 15
    max_coroutine: 100
    per_coroutine_points: 3000
    request_total_timeout: 40000
    retry: 1
    timeout: 2000
distributor:
  backup_push: null
  common:
    interval_report_second: 0
  forwards: null
  http:
    enable:
      - collect_change
      - collect_interval
    north_whitelist:
etrpc:
  disable_polaris_register: true
  ignore_rsp_wrapper_path:
    - /cgi/rtd
    - /cgi/rtdById
  restful_service_port: "61001"
  service_name: agent
  service_port: 61000
  trpc_service_port: 68081
feature:
  alarm_test: 0
  backup_push: 0
  collect_report: 1
  devs_local: 1
  mozu_topic: 0
  simulation: 1
  snmp-log: 0
  snmp-retry: 1
  standard_calculation: 1
  zhiyan: 0
global:
  container_name: tbox-machine
  env_name: tbox
  namespace: Production
plugin:
  interruption_judge_threshold: 50
  plugin_call_interval: 30
plugins:
  log:
    default:
      - caller_skip: 2
        enable_color: true
        formatter: console
        level: warn
        writer: console
      - caller_skip: 2
        level: warn
        writer: file
        writer_config:
          compress: false
          filename: server.log
          log_path: ./log
          max_age: 7
          max_backups: 2
          max_size: 100
          roll_type: size
          write_mode: 2
project:
  mode: agent
  module_group: default
  source: tlink
server:
  filter:
    - recovery
    - validation
  server: agent
  service:
    - ip: 0.0.0.0
      name: agent
      network: tcp
      port: 61000
      protocol: http
    - ip: 0.0.0.0
      name: agent-restful
      network: tcp
      port: 61001
      protocol: restful
  timeout: 60000
task:
  local:
    devs:
      - ZW-FY-BD04-M101-ITMA-SPM-DA
      - ZW-FY-BD04-M101-ITMA-SPM-DA
      - ZW-FY-BD04-M101-ITMB-SPM-DA
  mode: local
tbox:
  heartbeat_interval_ms: 5000
test:
  modbus_ip: 127.0.0.1
  snmp_addr: 127.0.0.1:11161
